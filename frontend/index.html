<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贝叶经叶片整理系统 v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>贝叶经叶片整理系统</h1>
        <p class="subtitle">高清图片标注 · 方案智能比对 · 版本可追溯</p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" data-tab="leaves">叶片管理</button>
        <button class="tab-btn" data-tab="annotate">图片标注</button>
        <button class="tab-btn" data-tab="plans">复原方案</button>
        <button class="tab-btn" data-tab="compare">方案比对</button>
        <button class="tab-btn" data-tab="audit">操作日志</button>
        <button class="tab-btn" data-tab="sort">排序推荐</button>
    </nav>

    <main class="container">
        <section id="leaves" class="tab-content active">
            <div class="panel">
                <h2>叶片列表</h2>
                <button id="addLeafBtn" class="btn btn-primary">+ 添加叶片</button>
                <div id="leavesList" class="leaves-grid"></div>
            </div>
        </section>

        <section id="annotate" class="tab-content">
            <div class="panel">
                <h2>图片标注</h2>
                <div class="annotate-controls">
                    <div class="control-group">
                        <label>选择叶片：</label>
                        <select id="annotateLeafSelect">
                            <option value="">请先选择叶片</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>标注工具：</label>
                        <div class="tool-group" id="toolGroup">
                            <button type="button" class="btn btn-sm tool-btn active" data-tool="hole">穿绳孔</button>
                            <button type="button" class="btn btn-sm tool-btn" data-tool="damage">破损区域</button>
                            <button type="button" class="btn btn-sm tool-btn" data-tool="text">残文区域</button>
                        </div>
                    </div>
                    <button id="uploadImageBtn" class="btn btn-secondary">上传图片</button>
                    <button id="saveAnnotationBtn" class="btn btn-primary">保存标注</button>
                    <input type="file" id="imageFileInput" accept="image/*" style="display:none">
                </div>
                <div class="annotate-main">
                    <div class="annotate-canvas-wrap">
                        <canvas id="annotateCanvas" class="annotate-canvas"></canvas>
                        <div id="canvasPlaceholder" class="canvas-placeholder">
                            请先选择叶片并上传高清图片
                        </div>
                    </div>
                    <div class="annotate-sidebar">
                        <h4>标注列表</h4>
                        <div class="annotation-section">
                            <h5>穿绳孔 (<span id="holeCount">0</span>)</h5>
                            <div id="holesList" class="annotation-list"></div>
                        </div>
                        <div class="annotation-section">
                            <h5>破损区域 (<span id="damageCount">0</span>)</h5>
                            <div id="damageList" class="annotation-list"></div>
                        </div>
                        <div class="annotation-section">
                            <h5>残文区域 (<span id="textCount">0</span>)</h5>
                            <div id="textList" class="annotation-list"></div>
                        </div>
                    </div>
                </div>
                <div class="scale-controls">
                    <div class="control-group">
                        <label>叶片实际长度 (mm)：</label>
                        <input type="number" id="realLength" step="0.01" min="0" placeholder="输入实际长度">
                    </div>
                    <div class="control-group">
                        <label>图片像素 / mm：</label>
                        <input type="number" id="scaleValue" step="0.01" min="0" placeholder="自动计算">
                    </div>
                </div>
            </div>
        </section>

        <section id="plans" class="tab-content">
            <div class="panel">
                <h2>复原方案</h2>
                <button id="addPlanBtn" class="btn btn-primary">+ 新建方案</button>
                <div id="plansList" class="plans-grid"></div>
            </div>
        </section>

        <section id="compare" class="tab-content">
            <div class="panel">
                <h2>方案智能比对</h2>
                <div class="compare-controls">
                    <div class="control-group">
                        <label>方案 A：</label>
                        <select id="comparePlanA">
                            <option value="">请选择方案</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>方案 B：</label>
                        <select id="comparePlanB">
                            <option value="">请选择方案</option>
                        </select>
                    </div>
                    <button id="runCompareBtn" class="btn btn-primary">开始比对</button>
                    <button id="exportCompareBtn" class="btn btn-secondary" disabled>导出报告</button>
                </div>
                <div id="compareResult" class="compare-result"></div>
            </div>
        </section>

        <section id="audit" class="tab-content">
            <div class="panel">
                <h2>操作日志与版本回溯</h2>
                <div class="audit-controls">
                    <div class="control-group">
                        <label>对象类型：</label>
                        <select id="logTargetType">
                            <option value="">全部</option>
                            <option value="leaf">叶片</option>
                            <option value="plan">方案</option>
                            <option value="annotation">标注</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>操作类型：</label>
                        <select id="logOpType">
                            <option value="">全部</option>
                            <option value="create">创建</option>
                            <option value="update">更新</option>
                            <option value="delete">删除</option>
                            <option value="upload">上传</option>
                            <option value="restore">恢复</option>
                            <option value="confirm">确认</option>
                        </select>
                    </div>
                    <button id="loadLogsBtn" class="btn btn-primary">加载日志</button>
                </div>
                <div id="auditLogs" class="audit-timeline"></div>

                <h3 style="margin-top:30px; color:#6b4423;">方案版本管理</h3>
                <div class="audit-controls">
                    <div class="control-group">
                        <label>选择方案：</label>
                        <select id="versionPlanSelect">
                            <option value="">请选择方案</option>
                        </select>
                    </div>
                    <button id="loadVersionsBtn" class="btn btn-primary">查看版本</button>
                    <button id="createVersionBtn" class="btn btn-secondary">创建快照</button>
                    <button id="exportVersionsBtn" class="btn btn-secondary" disabled>导出报告</button>
                </div>
                <div id="planVersions" class="plan-versions"></div>
            </div>
        </section>

        <section id="sort" class="tab-content">
            <div class="panel">
                <h2>智能排序推荐</h2>
                <div class="sort-controls">
                    <div class="control-group">
                        <label>起始叶片：</label>
                        <select id="startLeafSelect">
                            <option value="">自动选择</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>孔位权重：</label>
                        <input type="range" id="holeWeight" min="0" max="1" step="0.1" value="0.5">
                        <span id="holeWeightVal">0.5</span>
                    </div>
                    <div class="control-group">
                        <label>残文权重：</label>
                        <input type="range" id="textWeight" min="0" max="1" step="0.1" value="0.5">
                        <span id="textWeightVal">0.5</span>
                    </div>
                    <button id="runSortBtn" class="btn btn-primary">执行排序</button>
                </div>
                <div id="sortResult" class="sort-result"></div>
            </div>
        </section>
    </main>

    <div id="leafModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="leafModal">&times;</span>
            <h2 id="leafModalTitle">添加叶片</h2>
            <form id="leafForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>叶片编号 *</label>
                        <input type="text" id="leafId" required>
                    </div>
                    <div class="form-group">
                        <label>长度 (mm) *</label>
                        <input type="number" id="leafLength" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>宽度 (mm) *</label>
                        <input type="number" id="leafWidth" step="0.01" min="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>穿绳孔坐标 (X, Y，每行一个)</label>
                    <textarea id="leafHoles" placeholder="例如：&#10;10.5, 20.3&#10;45.2, 20.3"></textarea>
                </div>
                <div class="form-group">
                    <label>残存文字</label>
                    <textarea id="leafText" rows="3" placeholder="输入叶片上残存的文字内容..."></textarea>
                </div>
                <div class="form-group">
                    <label>破损情况</label>
                    <textarea id="leafDamage" rows="2" placeholder="描述叶片的破损情况..."></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="leafConfirmed">
                        已确认信息无误
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" data-close="leafModal">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="planModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="planModal">&times;</span>
            <h2 id="planModalTitle">新建复原方案</h2>
            <form id="planForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>方案编号 *</label>
                        <input type="text" id="planId" required>
                    </div>
                    <div class="form-group">
                        <label>方案名称 *</label>
                        <input type="text" id="planName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>方案说明</label>
                    <textarea id="planDescription" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>选择叶片（按顺序添加）</label>
                    <div class="plan-leaves-section">
                        <div class="available-leaves">
                            <h4>可用叶片</h4>
                            <div id="availableLeavesList" class="leaf-select-list"></div>
                        </div>
                        <div class="plan-leaves-actions">
                            <button type="button" id="addLeafToPlan" class="btn btn-sm">→</button>
                            <button type="button" id="removeLeafFromPlan" class="btn btn-sm">←</button>
                            <button type="button" id="moveLeafUp" class="btn btn-sm">↑</button>
                            <button type="button" id="moveLeafDown" class="btn btn-sm">↓</button>
                        </div>
                        <div class="selected-leaves">
                            <h4>已选叶片（当前顺序）</h4>
                            <div id="selectedLeavesList" class="leaf-select-list"></div>
                        </div>
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="planFinal">
                        标记为最终方案（所有叶片必须已确认）
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存方案</button>
                    <button type="button" class="btn btn-secondary" data-close="planModal">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="planDetailModal" class="modal">
        <div class="modal-content large">
            <span class="close" data-modal="planDetailModal">&times;</span>
            <h2 id="planDetailTitle">方案详情</h2>
            <div id="planDetailContent"></div>
            <div class="form-actions">
                <button type="button" id="createSnapshotBtn" class="btn btn-secondary">创建版本快照</button>
                <button type="button" id="editPlanBtn" class="btn btn-primary">编辑方案</button>
                <button type="button" id="recalcScoreBtn" class="btn btn-secondary">重新计算评分</button>
                <button type="button" id="deletePlanBtn" class="btn btn-danger">删除方案</button>
                <button type="button" class="btn btn-secondary" data-close="planDetailModal">关闭</button>
            </div>
        </div>
    </div>

    <div id="damageModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="damageModal">&times;</span>
            <h2>破损区域信息</h2>
            <form id="damageForm">
                <div class="form-group">
                    <label>破损程度</label>
                    <select id="damageSeverity">
                        <option value="mild">轻微</option>
                        <option value="medium" selected>中等</option>
                        <option value="severe">严重</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>破损描述</label>
                    <textarea id="damageDesc" rows="3" placeholder="描述破损情况..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">确定</button>
                    <button type="button" class="btn btn-secondary" data-close="damageModal">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="textModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="textModal">&times;</span>
            <h2>残文区域信息</h2>
            <form id="textForm">
                <div class="form-group">
                    <label>识别文字</label>
                    <textarea id="textContent" rows="3" placeholder="输入该区域识别出的文字..."></textarea>
                </div>
                <div class="form-group">
                    <label>关联破损区域</label>
                    <div id="linkedDamageList" class="linked-damage-list"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">确定</button>
                    <button type="button" class="btn btn-secondary" data-close="textModal">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="versionModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="versionModal">&times;</span>
            <h2>创建版本快照</h2>
            <form id="versionForm">
                <div class="form-group">
                    <label>版本名称</label>
                    <input type="text" id="versionName" placeholder="例如：初始版本、修订版本1...">
                </div>
                <div class="form-group">
                    <label>版本说明</label>
                    <textarea id="versionDesc" rows="3" placeholder="描述此版本的改动..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">创建</button>
                    <button type="button" class="btn btn-secondary" data-close="versionModal">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
